site_name: ITS Ontology - Traffic Regulations
site_description: A registry for documenting the ontology of traffic regulation concepts
repo_url: https://github.com/ISO-TC204/ontology-its-regulation
nav:
- Home: index.md
- Vehicle Characteristics Pattern:
  - Vehicle Characteristics Pattern Overview: classes/VehicleCharacteristicsPattern.md
  - Classes:
    - Emission Level Code: classes/EmissionLevelCode.md
    - Fuel Type Code: classes/FuelTypeCode.md
    - Goods Type Code: classes/GoodsTypeCode.md
    - Load Type Code: classes/LoadTypeCode.md
    - Vehicle Characteristics: classes/VehicleCharacteristics.md
    - Vehicle Equipment Code: classes/VehicleEquipmentCode.md
    - Vehicle Type Code: classes/VehicleTypeCode.md
    - Vehicle Usage Code: classes/VehicleUsageCode.md
  - Properties:
    - hasFuelType: properties/hasFuelType.md
    - hasGoodsType: properties/hasGoodsType.md
    - hasGrossMass: properties/hasGrossMass.md
    - hasHeaviestAxleMass: properties/hasHeaviestAxleMass.md
    - hasHeight: properties/hasHeight.md
    - hasKerbMass: properties/hasKerbMass.md
    - hasLength: properties/hasLength.md
    - hasLoadType: properties/hasLoadType.md
    - hasMaximumAllowedMass: properties/hasMaximumAllowedMass.md
    - hasNumberOfAxles: properties/hasNumberOfAxles.md
    - hasVehicleEquipment: properties/hasVehicleEquipment.md
    - hasVehicleType: properties/hasVehicleType.md
    - hasVehicleUsage: properties/hasVehicleUsage.md
    - hasWidth: properties/hasWidth.md
    - yearOfFirstRegistration: properties/yearOfFirstRegistration.md
site_url: https://github.com/ISO-TC204/ontology-its-regulation
copyright: <p xmlns:cc="http://creativecommons.org/ns#" xmlns:dct="http://purl.org/dc/terms/">
  <a href="https://creativecommons.org/licenses/by/4.0/?ref=chooser-v1" target="_blank"
  rel="license noopener noreferrer" style="display:inline-block;">CC BY 4.0<img style="height:22px!important;margin-left:3px;vertical-align:text-bottom;"
  src="https://mirrors.creativecommons.org/presskit/icons/cc.svg?ref=chooser-v1" alt=""><img
  style="height:22px!important;margin-left:3px;vertical-align:text-bottom;" src="https://mirrors.creativecommons.org/presskit/icons/by.svg?ref=chooser-v1"
  alt=""></a></p>
theme:
  name: material
  features:
  - content.code.copy
  - content.status
  - content.tooltips
  - icons
  - navigation.path
  - navigation.top
  icon:
    repo: fontawesome/brands/github
    admonition:
      question: fontawesome/solid/comments
  palette:
  - scheme: default
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - scheme: slate
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
extra_css:
- stylesheets/extra.css
extra_javascript:
- https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
- javascripts/tablesort.js
plugins:
- search
- git-revision-date-localized:
    type: date
markdown_extensions:
- abbr
- admonition
- attr_list
- def_list
- md_in_html
- meta
- footnotes
- pymdownx.blocks.caption
- pymdownx.details
- pymdownx.highlight:
    anchor_linenums: true
    line_spans: __span
    pygments_lang_class: true
    use_pygments: true
- pymdownx.inlinehilite
- pymdownx.snippets:
    base_path: docs
    check_paths: true
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: ''
- pymdownx.tabbed:
    alternate_style: true
- toc:
    permalink: true
extra:
  search:
    highlight: true
  hide:
  - title
  version:
    provider: mike
    alias: true
    default: latest
